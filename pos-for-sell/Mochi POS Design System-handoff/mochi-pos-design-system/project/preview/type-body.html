<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px 24px; background: var(--panel); margin: 0; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .lbl { font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); width: 90px; flex-shrink: 0; }
  .body14 { font-size: 14px; line-height: 1.5; }
  .body13 { font-size: 13px; line-height: 1.5; color: var(--muted); }
  .eb { font-size: 11px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .num { font-variant-numeric: tabular-nums lining-nums; letter-spacing: -.01em; font-weight: 800; font-size: 22px; }
</style></head><body>
<div class="stack">
  <div class="row"><div class="lbl">Eyebrow</div><div class="eb">Today · Day 3 of 4</div></div>
  <div class="row"><div class="lbl">Body 14</div><div class="body14">Mochi the Persian last visited Pet Expo Q1 — bought The Triceratops and a Banana Doll.</div></div>
  <div class="row"><div class="lbl">Caption 13</div><div class="body13">SKU 002A · Cat Curator (Blue) · ฿1,290</div></div>
  <div class="row"><div class="lbl">Number</div><div class="num">฿42,180</div></div>
</div>
</body></html>
