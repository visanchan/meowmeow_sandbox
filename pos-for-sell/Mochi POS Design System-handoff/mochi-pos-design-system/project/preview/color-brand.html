<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 22px; background: var(--panel); margin: 0; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 132px; }
  .chip { width: 100%; height: 64px; border-radius: 14px; box-shadow: var(--shadow-rest); border: 1px solid var(--line); }
  .lbl { margin-top: 8px; font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--text); }
  .hex { margin-top: 2px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); font-weight: 700; }
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--indigo)"></div><div class="lbl">indigo</div><div class="hex">#2d2960</div></div>
  <div class="sw"><div class="chip" style="background:var(--indigo-600)"></div><div class="lbl">indigo-600</div><div class="hex">#4a4396</div></div>
  <div class="sw"><div class="chip" style="background:var(--lavender-700)"></div><div class="lbl">lavender-700</div><div class="hex">#7a6ad6</div></div>
  <div class="sw"><div class="chip" style="background:var(--lavender)"></div><div class="lbl">lavender</div><div class="hex">#b8a9f0</div></div>
  <div class="sw"><div class="chip" style="background:var(--lavender-200)"></div><div class="lbl">lavender-200</div><div class="hex">#e2dafa</div></div>
</div>
</body></html>
