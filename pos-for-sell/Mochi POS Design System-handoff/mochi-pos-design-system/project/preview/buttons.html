<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px 24px; background: var(--bg); margin: 0; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  button { font-family: inherit; font-weight: 700; cursor: pointer; }
  .primary { padding: 12px 22px; border: none; background: var(--grad-primary); color: var(--on-indigo); border-radius: 14px; font-size: 14px; box-shadow: var(--shadow-rest); }
  .secondary { padding: 12px 22px; border: 1px solid var(--line-strong); background: var(--panel); color: var(--indigo); border-radius: 14px; font-size: 14px; }
  .accent { padding: 12px 22px; border: none; background: var(--lavender); color: var(--on-lavender); border-radius: 14px; font-size: 14px; }
  .ghost { padding: 12px 18px; border: none; background: transparent; color: var(--indigo-600); font-size: 14px; }
  .danger { padding: 12px 22px; border: 1px solid var(--danger); background: var(--panel); color: var(--danger); border-radius: 14px; font-size: 14px; }
  .small { padding: 8px 14px; border: none; background: var(--indigo-50); color: var(--indigo); border-radius: 10px; font-size: 12px; font-weight: 700; }
</style></head><body>
<div class="row">
  <button class="primary">Charge ฿1,470</button>
  <button class="accent">Send Later</button>
  <button class="secondary">Save draft</button>
  <button class="ghost">Skip customer →</button>
  <button class="danger">Void sale</button>
  <button class="small">+ Add SKU</button>
</div>
</body></html>
