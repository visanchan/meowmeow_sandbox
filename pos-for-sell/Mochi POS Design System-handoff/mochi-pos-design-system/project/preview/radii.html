<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 22px; background: var(--panel); margin: 0; }
  .row { display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
  .sw { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; }
  .box { background: var(--lavender-200); border: 1px solid var(--lavender-300); }
  .lbl { font-size: 10px; font-weight: 800; letter-spacing: .04em; color: var(--muted); font-family: var(--font-mono); }
</style></head><body>
<div class="row">
  <div class="sw"><div class="box" style="width:48px;height:48px;border-radius:8px"></div><div class="lbl">8 · xs</div></div>
  <div class="sw"><div class="box" style="width:56px;height:56px;border-radius:12px"></div><div class="lbl">12 · sm</div></div>
  <div class="sw"><div class="box" style="width:64px;height:64px;border-radius:16px"></div><div class="lbl">16 · md</div></div>
  <div class="sw"><div class="box" style="width:72px;height:72px;border-radius:20px"></div><div class="lbl">20 · lg</div></div>
  <div class="sw"><div class="box" style="width:84px;height:84px;border-radius:28px"></div><div class="lbl">28 · xl</div></div>
  <div class="sw"><div class="box" style="width:96px;height:96px;border-radius:36px"></div><div class="lbl">36 · 2xl</div></div>
  <div class="sw"><div class="box" style="width:48px;height:32px;border-radius:999px"></div><div class="lbl">999 · pill</div></div>
</div>
</body></html>
