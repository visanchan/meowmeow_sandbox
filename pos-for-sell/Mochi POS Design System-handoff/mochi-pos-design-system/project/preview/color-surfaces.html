<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 22px; background: var(--panel); margin: 0; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { width: 132px; }
  .chip { width: 100%; height: 64px; border-radius: 14px; box-shadow: var(--shadow-rest); border: 1px solid var(--line); }
  .lbl { margin-top: 8px; font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--text); }
  .hex { margin-top: 2px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); font-weight: 700; }
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--bg)"></div><div class="lbl">bg</div><div class="hex">#f7f5fb</div></div>
  <div class="sw"><div class="chip" style="background:var(--bg-soft)"></div><div class="lbl">bg-soft</div><div class="hex">#efeaf6</div></div>
  <div class="sw"><div class="chip" style="background:var(--panel)"></div><div class="lbl">panel</div><div class="hex">#ffffff</div></div>
  <div class="sw"><div class="chip" style="background:var(--cream)"></div><div class="lbl">cream</div><div class="hex">#f4eedf</div></div>
  <div class="sw"><div class="chip" style="background:var(--text)"></div><div class="lbl" style="color:var(--bg)">text</div><div class="hex">#1c1838</div></div>
</div>
</body></html>
