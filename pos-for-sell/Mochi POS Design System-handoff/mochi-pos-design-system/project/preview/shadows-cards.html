<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px 24px; background: var(--bg); margin: 0; }
  .row { display: flex; gap: 16px; }
  .card { flex: 1; padding: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: 20px; }
  .rest  { box-shadow: var(--shadow-rest); }
  .card2 { box-shadow: var(--shadow-card); }
  .pop   { box-shadow: var(--shadow-pop); }
  .lbl { font-size: 11px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
  .hint { font-family: var(--font-mono); font-size: 10px; color: var(--muted-soft); margin-top: 4px; }
  h4 { margin: 6px 0 0; font-size: 16px; font-weight: 800; color: var(--text); }
</style></head><body>
<div class="row">
  <div class="card rest"><div class="lbl">Rest</div><h4>Resting card</h4><div class="hint">0 1px 2px / 0 4px 12px</div></div>
  <div class="card card2"><div class="lbl">Card</div><h4>Hovered / focal</h4><div class="hint">0 4px 12px / 0 24px 48px</div></div>
  <div class="card pop"><div class="lbl">Pop</div><h4>Modal / popover</h4><div class="hint">0 12px 24px / 0 32px 80px</div></div>
</div>
</body></html>
