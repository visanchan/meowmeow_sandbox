<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px 22px;background:var(--panel);}
  .row{display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;gap:6px;min-width:120px;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-weight:800;font-size:11px;letter-spacing:.04em;}
  .dot{width:10px;height:10px;border-radius:50%;}
  .lab{font-size:11px;font-weight:800;color:var(--text);}
  .hex{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);}
</style></head><body>
<div class="row">
  <div class="item">
    <span class="pill" style="background:var(--success-bg);color:var(--success)"><span class="dot" style="background:var(--success)"></span>In stock</span>
    <div class="lab">success</div><div class="hex">#4f7a3f / #dfe7d1</div>
  </div>
  <div class="item">
    <span class="pill" style="background:var(--warn-bg);color:var(--warn)"><span class="dot" style="background:var(--warn)"></span>Low stock — 2 left</span>
    <div class="lab">warn</div><div class="hex">#8c6226 / #fff1d7</div>
  </div>
  <div class="item">
    <span class="pill" style="background:var(--danger-bg);color:var(--danger)"><span class="dot" style="background:var(--danger)"></span>Sold out</span>
    <div class="lab">danger</div><div class="hex">#b44b3f / #f8e1de</div>
  </div>
  <div class="item">
    <span class="pill" style="background:var(--info-bg);color:#3a4a8c"><span class="dot" style="background:#3a4a8c"></span>Pending sync</span>
    <div class="lab">info</div><div class="hex">#3a4a8c / #eef1ff</div>
  </div>
</div>
</body></html>
