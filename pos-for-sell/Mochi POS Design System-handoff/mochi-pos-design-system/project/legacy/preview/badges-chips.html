<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px 22px;background:var(--panel);display:flex;gap:14px;flex-wrap:wrap;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;font-weight:800;font-size:11px;letter-spacing:.04em;text-transform:uppercase;}
  .dot{width:8px;height:8px;border-radius:50%;}
  .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-family:var(--font-mono);font-size:10.5px;font-weight:700;color:var(--muted);background:var(--soft);}
  .num-badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:var(--accent);color:#fff;font-size:11px;font-weight:800;}
</style></head><body>
  <span class="pill" style="background:var(--success-bg);color:var(--success)"><span class="dot" style="background:var(--success)"></span>In stock</span>
  <span class="pill" style="background:var(--warn-bg);color:var(--warn)"><span class="dot" style="background:var(--warn)"></span>2 left</span>
  <span class="pill" style="background:var(--danger-bg);color:var(--danger)"><span class="dot" style="background:var(--danger)"></span>Sold out</span>
  <span class="pill" style="background:var(--info-bg);color:#3a4a8c"><span class="dot" style="background:#3a4a8c"></span>Pending sync</span>
  <span class="badge">SKU 002A</span>
  <span class="badge">SKU 017</span>
  <span class="num-badge">3</span>
  <span class="num-badge" style="background:var(--accent-strong)">12</span>
</body></html>
