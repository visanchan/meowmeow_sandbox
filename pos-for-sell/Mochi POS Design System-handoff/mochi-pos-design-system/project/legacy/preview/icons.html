<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px 22px;background:var(--panel);display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
  .icon{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--text);}
  .icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;}
  .lab{font-size:10px;font-weight:700;color:var(--muted);font-family:var(--font-mono);}
</style></head><body>
<div class="icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><path d="m20 20-3.5-3.5"/></svg><div class="lab">search</div></div>
<div class="icon"><svg viewBox="0 0 24 24"><path d="M3 6v12M7 6v12M11 6v12M15 6v12M19 6v12"/></svg><div class="lab">scan</div></div>
<div class="icon"><svg viewBox="0 0 24 24"><circle cx="9" cy="20" r="1.4"/><circle cx="17" cy="20" r="1.4"/><path d="M3 4h2l2.4 11h11l2-7H6"/></svg><div class="lab">cart</div></div>
<div class="icon"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><div class="lab">plus</div></div>
<div class="icon"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg><div class="lab">minus</div></div>
<div class="icon"><svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6 6 18"/></svg><div class="lab">close</div></div>
<div class="icon"><svg viewBox="0 0 24 24"><path d="m5 12 5 5L20 7"/></svg><div class="lab">check</div></div>
<div class="icon"><svg viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></svg><div class="lab">chevron</div></div>
<div class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg><div class="lab">calendar</div></div>
<div class="icon"><svg viewBox="0 0 24 24"><path d="M7 9V4h10v5"/><rect x="4" y="9" width="16" height="8" rx="1.5"/><rect x="7" y="14" width="10" height="6"/></svg><div class="lab">printer</div></div>
</body></html>
