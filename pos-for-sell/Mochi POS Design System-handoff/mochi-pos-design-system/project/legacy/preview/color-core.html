<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:18px 22px;background:var(--panel);}
  .row{display:flex;align-items:center;gap:28px;}
  .swatch{display:flex;flex-direction:column;gap:6px;}
  .chip{width:120px;height:64px;border-radius:14px;box-shadow:var(--shadow-rest);border:1px solid var(--line-warm);}
  .label{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--text);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--muted);}
</style></head><body>
<div class="row">
  <div class="swatch"><div class="chip" style="background:var(--bg)"></div><div class="label">bg</div><div class="hex">#f6f0e6</div></div>
  <div class="swatch"><div class="chip" style="background:var(--panel)"></div><div class="label">panel</div><div class="hex">#fffaf3</div></div>
  <div class="swatch"><div class="chip" style="background:var(--soft)"></div><div class="label">soft</div><div class="hex">#efe5d6</div></div>
  <div class="swatch"><div class="chip" style="background:var(--accent)"></div><div class="label" style="color:#fff;background:var(--accent);padding:2px 6px;border-radius:6px;display:inline-block">accent</div><div class="hex">#8d6236</div></div>
  <div class="swatch"><div class="chip" style="background:var(--accent-strong)"></div><div class="label">accent-strong</div><div class="hex">#6e4b27</div></div>
  <div class="swatch"><div class="chip" style="background:var(--gold)"></div><div class="label">gold</div><div class="hex">#c59a54</div></div>
</div>
</body></html>
