<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:0;margin:0;background:var(--panel);display:flex;align-items:center;justify-content:center;min-height:100vh;}
  .slip{width:300px;background:var(--slip-bg);border-radius:14px;padding:22px 22px 18px;box-shadow:var(--shadow-card);font-family:var(--font-body);}
  .head{display:flex;flex-direction:column;align-items:center;gap:0;line-height:.88;letter-spacing:-.045em;font-family:var(--font-display);font-weight:700;color:var(--text-deep);}
  .head .the{font-size:18px;letter-spacing:-.01em;}
  .head .meow{font-size:46px;}
  .head .seum{font-size:34px;letter-spacing:.035em;}
  .sub{text-align:center;font-size:10.5px;color:var(--muted);margin-top:6px;letter-spacing:.04em;text-transform:uppercase;font-weight:700;}
  .rule{border:none;border-top:1.5px dashed var(--slip-line);margin:12px 0;}
  .row{display:flex;justify-content:space-between;font-size:12px;color:var(--text);}
  .row.b{font-weight:800;}
  .small{font-size:10px;color:var(--muted);font-family:var(--font-mono);text-align:center;margin-top:8px;}
  .paw{text-align:center;font-size:14px;margin-top:6px;}
</style></head><body>
<div class="slip">
  <div class="head"><span class="the">THE</span><span class="meow">Meow</span><span class="seum">SEUM</span></div>
  <div class="sub">Pet Expo · Day 02</div>
  <hr class="rule">
  <div class="row"><span>Ionic Column ×1</span><span>฿890</span></div>
  <div class="row"><span>Banana Doll ×1</span><span>฿290</span></div>
  <hr class="rule">
  <div class="row b"><span>Total</span><span>฿1,180</span></div>
  <div class="row" style="color:var(--muted);margin-top:4px"><span>Cash</span><span>฿1,200</span></div>
  <div class="row" style="color:var(--muted)"><span>Change</span><span>฿20</span></div>
  <hr class="rule">
  <div class="small">MW-20260506-0142</div>
  <div class="paw">🐾</div>
</div>
</body></html>
