<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:var(--panel);display:flex;flex-direction:column;gap:12px;max-width:380px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  label{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-warm);}
  input,select{font-family:inherit;font-size:14px;color:var(--text);background:var(--panel-strong);border:1px solid var(--line);border-radius:12px;padding:10px 14px;outline:none;}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(141,98,54,.16);}
  .search{display:flex;align-items:center;gap:8px;background:var(--panel-strong);border:1px solid var(--line);border-radius:14px;padding:9px 14px;}
  .search input{border:none;background:transparent;padding:0;flex:1;}
  .glyph{color:var(--accent);font-weight:800;}
</style></head><body>
<div class="field"><label>Customer name</label><input value="Walk-in customer"></div>
<div class="field"><label>Tender</label><select><option>Cash</option><option>QR PromptPay</option><option>Card</option></select></div>
<div class="search"><span class="glyph">⌕</span><input placeholder="Search products or scan barcode…"></div>
</body></html>
