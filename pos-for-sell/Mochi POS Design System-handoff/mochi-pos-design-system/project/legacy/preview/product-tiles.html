<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:var(--panel);display:flex;gap:18px;align-items:flex-start;}
  .tile{width:160px;border-radius:20px;background:linear-gradient(180deg,var(--panel-strong) 0%,var(--panel-grad-bot) 100%);box-shadow:var(--shadow-card);overflow:hidden;display:flex;flex-direction:column;}
  .tile .img{aspect-ratio:1;background:var(--soft);display:flex;align-items:center;justify-content:center;}
  .tile .img img{width:100%;height:100%;object-fit:cover;}
  .tile .info{padding:10px 12px 12px;display:flex;flex-direction:column;gap:4px;}
  .name{font-size:13px;font-weight:800;color:var(--text);line-height:1.2;}
  .meta{display:flex;justify-content:space-between;align-items:center;}
  .sku{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);font-weight:700;}
  .price{font-size:14px;font-weight:800;color:var(--accent-strong);font-variant-numeric:tabular-nums;}
  .pill{position:absolute;top:8px;left:8px;display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-weight:800;font-size:10px;letter-spacing:.04em;text-transform:uppercase;background:var(--warn-bg);color:var(--warn);}
  .img-wrap{position:relative;}
  .so .img{filter:grayscale(.8) opacity(.55);}
  .so .name{color:var(--muted);}
  .so .pill{background:var(--danger-bg);color:var(--danger);}
</style></head><body>
<div class="tile">
  <div class="img-wrap"><div class="img"><img src="../assets/products/003.png" alt=""></div></div>
  <div class="info"><div class="name">The Ionic Column</div><div class="meta"><span class="sku">003</span><span class="price">฿890</span></div></div>
</div>
<div class="tile">
  <div class="img-wrap"><div class="img"><img src="../assets/products/006.png" alt=""></div><span class="pill">2 left</span></div>
  <div class="info"><div class="name">The Triceratops</div><div class="meta"><span class="sku">006</span><span class="price">฿1,290</span></div></div>
</div>
<div class="tile so">
  <div class="img-wrap"><div class="img"><img src="../assets/products/014.png" alt=""></div><span class="pill">Sold out</span></div>
  <div class="info"><div class="name">Venus</div><div class="meta"><span class="sku">014</span><span class="price">฿1,490</span></div></div>
</div>
</body></html>
