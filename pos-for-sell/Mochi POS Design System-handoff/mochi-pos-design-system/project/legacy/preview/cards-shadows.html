<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:var(--panel);display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;}
  .card{padding:18px 20px;border-radius:20px;background:linear-gradient(180deg,var(--panel-strong) 0%,var(--panel-grad-bot) 100%);min-width:220px;}
  .rest{box-shadow:var(--shadow-rest);}
  .card-shadow{box-shadow:var(--shadow-card);}
  .pop{box-shadow:var(--shadow-pop);}
  .label{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--muted-warm);text-transform:uppercase;}
  .value{font-size:24px;font-weight:900;color:var(--text);margin-top:4px;letter-spacing:-.01em;}
  .meta{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-top:8px;}
</style></head><body>
<div class="card rest"><div class="label">Rest</div><div class="value">฿1,290</div><div class="meta">10/20 · .05α</div></div>
<div class="card card-shadow"><div class="label">Card</div><div class="value">฿4,180</div><div class="meta">22/52 · .10α</div></div>
<div class="card pop"><div class="label">Pop / modal</div><div class="value">฿42,180</div><div class="meta">28/64 · .14α</div></div>
</body></html>
