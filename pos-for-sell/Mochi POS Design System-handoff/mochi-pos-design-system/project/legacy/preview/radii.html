<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{padding:20px;background:var(--panel);display:flex;gap:14px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;gap:6px;align-items:center;}
  .b{background:var(--soft);border:1px solid var(--line);}
  .lab{font-size:11px;font-weight:800;color:var(--text);}
  .px{font-family:var(--font-mono);font-size:10.5px;color:var(--muted);}
</style></head><body>
<div class="item"><div class="b" style="width:60px;height:60px;border-radius:8px"></div><div class="lab">xs</div><div class="px">8</div></div>
<div class="item"><div class="b" style="width:60px;height:60px;border-radius:10px"></div><div class="lab">sm</div><div class="px">10</div></div>
<div class="item"><div class="b" style="width:60px;height:60px;border-radius:14px"></div><div class="lab">md</div><div class="px">14</div></div>
<div class="item"><div class="b" style="width:70px;height:70px;border-radius:20px"></div><div class="lab">lg</div><div class="px">20</div></div>
<div class="item"><div class="b" style="width:80px;height:80px;border-radius:28px"></div><div class="lab">xl</div><div class="px">28</div></div>
<div class="item"><div class="b" style="width:90px;height:90px;border-radius:32px"></div><div class="lab">2xl</div><div class="px">32</div></div>
<div class="item"><div class="b" style="width:90px;height:36px;border-radius:999px"></div><div class="lab">pill</div><div class="px">999</div></div>
</body></html>
